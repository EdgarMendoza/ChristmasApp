<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' 'unsafe-inline'; connect-src 'self';" />
    <title>Holiday Helper</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />

    <link rel="stylesheet" href="css/app.css?v={VERSION}" />
    <link href="ChristmasApp.styles.css?v={VERSION}" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css?v={VERSION}" rel="stylesheet" />

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Christmas App" />
    <link rel="manifest" href="/site.webmanifest" />

    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js?v={VERSION}"></script>

    <script>
        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
            .then(registration => {
                console.log('Service Worker registered');
                
                registration.onupdatefound = () => {
                    const installingWorker = registration.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed') {
                            if (navigator.serviceWorker.controller) {
                                // New content is available; please refresh.
                                console.log('New content is available; please refresh.');
                                if (confirm('A new version of Holiday Helper is available. Update now?')) {
                                    window.location.reload();
                                }
                            } else {
                                // Content is cached for offline use.
                                console.log('Content is cached for offline use.');
                            }
                        }
                    };
                };
            });
    </script>
</body>

</html>
